name: Build and Push Invenio Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'docker/invenio/**'
      - 'site/**'
      - 'templates/**'
      - 'static/**'
      - 'translations/**'
      - 'app_data/**'
      - '.github/workflows/build-image.yaml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag (optional)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/invenio-rdm-custom

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/invenio/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Summarize image tags
        run: |
          echo "## Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | while read tag; do
            echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
          done

  verify:
    name: Verify Image
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and inspect image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Pulling $IMAGE..."
          for i in 1 2 3 4 5; do
            docker pull $IMAGE && break
            echo "Pull failed, retrying in 10s ($i/5)..."
            sleep 10
          done
          echo "=== Image Info ==="
          docker inspect $IMAGE --format='{{.Id}}'
          echo "=== Layers ==="
          docker history $IMAGE --format="{{.CreatedBy}}" | head -20
          echo "=== Size ==="
          docker images $IMAGE --format="{{.Size}}"

      - name: Test image starts
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Run a quick smoke test to verify the image can start
          docker run --rm $IMAGE python -c \
            "import invenio_app; print('Invenio app imported successfully'); \
             import invenio_s3; print('invenio-s3 imported successfully'); \
             import boto3; print('boto3 imported successfully'); \
             print('All imports OK')"

  notify-argocd:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [build, verify]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5
    steps:
      - name: Install ArgoCD CLI
        run: |
          wget -q https://github.com/argoproj/argo-cd/releases/download/v2.10.0/argocd-linux-amd64
          chmod +x argocd-linux-amd64
          sudo mv argocd-linux-amd64 /usr/local/bin/argocd

      - name: Sync Invenio app
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          ARGOCD_OPTS="--server $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN --grpc-web --insecure"
          echo "Syncing invenio-bootstrap..."
          argocd app sync invenio-bootstrap $ARGOCD_OPTS --force || true
          echo "Waiting for health..."
          argocd app wait invenio-bootstrap $ARGOCD_OPTS --health --timeout 300 || true
