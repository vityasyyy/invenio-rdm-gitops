name: Deploy Verify

on:
  push:
    branches: [main]
    paths:
      - 'argocd/**'
      - 'k8s/**'
      - 'external-lb/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify-argocd-sync:
    name: Verify ArgoCD Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for sync and verify health
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set +e

          ARGOCD_URL="https://${ARGOCD_SERVER}"
          AUTH_HEADER="Authorization: Bearer ${ARGOCD_AUTH_TOKEN}"

          echo "Waiting up to 5 minutes for ArgoCD apps to sync and become healthy..."
          timeout=300
          interval=10
          elapsed=0

          while [ $elapsed -lt $timeout ]; do
            echo "Checking ArgoCD app status (elapsed: ${elapsed}s)..."

            response=$(curl -s -k \
              -H "$AUTH_HEADER" \
              -H "Content-Type: application/json" \
              -w "\n%{http_code}" \
              "${ARGOCD_URL}/api/v1/applications" 2>/dev/null)
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" != "200" ]; then
              echo "ArgoCD API returned HTTP ${http_code} (will retry)"
              sleep $interval
              elapsed=$((elapsed + interval))
              continue
            fi

            unhealthy_filter='.items[]'
            unhealthy_filter+=' | select(.status.health.status != "Healthy"'
            unhealthy_filter+=' or .status.sync.status != "Synced")'
            unhealthy_filter+=' | .metadata.name'
            unhealthy_apps=$(echo "$body" | \
              jq -r "$unhealthy_filter" 2>/dev/null)

            if [ -z "$unhealthy_apps" ]; then
              echo "All ArgoCD apps are synced and healthy!"
              summary_filter='.items[] | "  \(.metadata.name)"'
              summary_filter+=' Health=\(.status.health.status)'
              summary_filter+=' Sync=\(.status.sync.status)'
              echo "$body" | jq -r "$summary_filter" 2>/dev/null
              exit 0
            fi

            echo "Unhealthy/unsynced apps:"
            detail_filter='.items[]'
            detail_filter+=' | select(.status.health.status != "Healthy"'
            detail_filter+=' or .status.sync.status != "Synced")'
            detail_filter+=' | "  - \(.metadata.name)"'
            detail_filter+=' (Health: \(.status.health.status)'
            detail_filter+=', Sync: \(.status.sync.status))"'
            echo "$body" | jq -r "$detail_filter" 2>/dev/null

            sleep $interval
            elapsed=$((elapsed + interval))
          done

          echo "Timeout: Some apps are still unhealthy or unsynced after ${timeout}s"
          echo "Final status:"
          final_filter='.items[] | "  - \(.metadata.name)"'
          final_filter+=' (Health: \(.status.health.status)'
          final_filter+=', Sync: \(.status.sync.status))"'
          curl -s -k -H "$AUTH_HEADER" \
            "${ARGOCD_URL}/api/v1/applications" 2>/dev/null | \
            jq -r "$final_filter" 2>/dev/null || \
            echo "Could not retrieve final status from ArgoCD"
          exit 1

      - name: Smoke test
        run: |
          echo "Running smoke test against InvenioRDM health endpoint..."
          HEALTH_URL="${HEALTH_URL:-https://invenio.vityasy.me/ping}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 "${HEALTH_URL}" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Smoke test passed: ${HEALTH_URL} returned HTTP ${HTTP_CODE}"
          else
            echo "Smoke test returned HTTP ${HTTP_CODE} from ${HEALTH_URL}"
            echo "  This may be expected if CI cannot reach the endpoint"
            echo "  (private network/Cloudflare)"
            echo "  This step does not fail the workflow."
