name: Deploy Verify

on:
  push:
    branches: [main]
    paths:
      - 'argocd/**'
      - 'k8s/**'
      - 'external-lb/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify-argocd-sync:
    name: Verify ArgoCD Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          wget https://github.com/argoproj/argo-cd/releases/download/v2.12.0/argocd-linux-amd64
          chmod +x argocd-linux-amd64
          sudo mv argocd-linux-amd64 /usr/local/bin/argocd

      - name: Wait for sync and verify health
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          # Pass credentials directly to every command; skip 'argocd login' in CI
          ARGOCD_OPTS="--server $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN --grpc-web --insecure"

          echo "Waiting up to 5 minutes for ArgoCD apps to sync and become healthy..."
          timeout=300
          interval=10
          elapsed=0

          while [ $elapsed -lt $timeout ]; do
            echo "Checking ArgoCD app status (elapsed: ${elapsed}s)..."
            unhealthy_apps=$(argocd app list $ARGOCD_OPTS -o json | \
              jq -r '.[] | select(.status.health.status != "Healthy" or .status.sync.status != "Synced") | .metadata.name')

            if [ -z "$unhealthy_apps" ]; then
              echo "✓ All ArgoCD apps are synced and healthy!"
              argocd app list $ARGOCD_OPTS
              exit 0
            fi

            echo "Unhealthy/unsynced apps:"
            argocd app list $ARGOCD_OPTS -o json | \
              jq -r '.[] | select(.status.health.status != "Healthy" or .status.sync.status != "Synced") | "  - \(.metadata.name) (Health: \(.status.health.status), Sync: \(.status.sync.status))"'

            sleep $interval
            elapsed=$((elapsed + interval))
          done

          echo "❌ Timeout: Some apps are still unhealthy or unsynced after ${timeout}s"
          echo "Final status:"
          argocd app list $ARGOCD_OPTS
          exit 1

      - name: Smoke test
        run: |
          echo "Running smoke test against InvenioRDM health endpoint..."
          HEALTH_URL="${HEALTH_URL:-https://invenio.vityasy.me/api/health}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "${HEALTH_URL}" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Smoke test passed: ${HEALTH_URL} returned HTTP ${HTTP_CODE}"
          else
            echo "⚠ Smoke test returned HTTP ${HTTP_CODE} from ${HEALTH_URL}"
            echo "  This may be expected if CI cannot reach the endpoint (private network/Cloudflare)"
            echo "  This step does not fail the workflow."
          fi
