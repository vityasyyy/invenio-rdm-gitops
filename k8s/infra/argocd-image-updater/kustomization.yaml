# ArgoCD Image Updater Installation
# Watches container registries for new images and auto-updates ArgoCD apps
# https://argocd-image-updater.readthedocs.io/
#
# Install: kubectl apply -k k8s/infra/argocd-image-updater/

namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj-labs/argocd-image-updater/v1.2.0/config/install.yaml

patches:
  # The v1.2.0 install.yaml ships an empty argocd-image-updater-config ConfigMap.
  # We add the data section with our settings.
  - target:
      kind: ConfigMap
      name: argocd-image-updater-config
    patch: |-
      - op: add
        path: /data
        value:
          log.level: info
          argocd.server_addr: argocd-server.argocd.svc.cluster.local:443
          argocd.insecure: "true"
          # Registry configuration for GitHub Container Registry
          registries.conf: |
            registries:
              - name: GitHub Container Registry
                prefix: ghcr.io
                api_url: https://ghcr.io
                credentials: secret:argocd/ghcr-credentials
                defaultns: library
                default: true