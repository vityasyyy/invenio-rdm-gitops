# Network policies for InvenioRDM namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-default-deny
  namespace: invenio
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-traefik
  namespace: invenio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: invenio-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-monitoring-scrape
  namespace: invenio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: invenio-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-egress-dns
  namespace: invenio
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-egress-postgresql
  namespace: invenio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: invenio-rdm
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - port: 5432
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-egress-redis
  namespace: invenio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: invenio-rdm
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redis
      ports:
        - port: 6379
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-egress-search
  namespace: invenio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: invenio-rdm
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: search
      ports:
        - port: 9200
          protocol: TCP
        - port: 9300
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-egress-minio
  namespace: invenio
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: invenio-rdm
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - port: 9000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invenio-allow-egress-https
  namespace: invenio
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
