# Allow MinIO to accept traffic from all namespaces
# Also allow MinIO to make outbound connections
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-all-allow
  namespace: minio
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector: {}