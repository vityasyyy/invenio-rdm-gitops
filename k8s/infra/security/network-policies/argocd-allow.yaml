# Allow Traefik to reach ArgoCD server
# Allow inter-pod communication within argocd namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-argocd
  namespace: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
    - from:
        - podSelector: {}
      # Allow inter-pod communication within argocd namespace
