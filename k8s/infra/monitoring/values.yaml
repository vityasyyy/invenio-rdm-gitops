# Prometheus/Grafana Helm Values - Versioned Configuration
#
# Chart: kube-prometheus-stack v69.6.0
# Source: https://prometheus-community.github.io/helm-charts
#
# This file is the source of truth for Monitoring stack configuration.
# Any changes should be committed to Git.

# Prometheus configuration
prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: btd-nfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# Grafana configuration
grafana:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  admin:
    existingSecret: "monitoring-grafana"
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: btd-nfs
    size: 2Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  initChownData:
    enabled: false
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    providers:
      enabled: true

# Alertmanager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  config:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@example.com'
      smtp_auth_username: ''
      # IMPORTANT: Set SMTP password via one of the methods below.
      # Option 1 (kubectl patch): After deployment, run:
      #   kubectl -n monitoring patch secret alertmanager-monitoring-kube-prometheus-alertmanager --type=merge -p '{"data":{"alertmanager.yaml":"<base64-of-full-config>"}}'
      # Option 2 (SealedSecret): Create a SealedSecret for alertmanager.yaml and apply it.
      # Option 3 (Helm values - less secure): Set smtp_auth_password directly here (NOT recommended for Git).
    route:
      receiver: 'email'
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
      - name: 'email'
        email_configs:
          - to: 'your-email@example.com'
            send_resolved: true
            headers:
              Subject: 'Kubernetes Alert: {{ .GroupLabels.alertname }}'

# Default alerting rules
defaultRules:
  create: true
  rules:
    etcd: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeProxy: false
    kubeControllerManager: false

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Node Exporter
nodeExporter:
  enabled: true
  nodeAffinity: {}
  tolerations:
    - operator: Exists

# Prometheus Operator - disable admission webhooks to prevent failing job
prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
