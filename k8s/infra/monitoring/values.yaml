# Prometheus/Grafana Helm Values - Versioned Configuration
#
# Chart: kube-prometheus-stack v69.6.0
# Source: https://prometheus-community.github.io/helm-charts
#
# This file is the source of truth for Monitoring stack configuration.
# Any changes should be committed to Git.

# Prometheus configuration
prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: btd-nfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# Grafana configuration
grafana:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  admin:
    existingSecret: "monitoring-grafana"
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: btd-nfs
    size: 2Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  initChownData:
    enabled: false
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    providers:
      enabled: true

# Alertmanager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: btd-nfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "null"
      routes:
        - match:
            alertname: Watchdog
          receiver: "null"
        - match:
            severity: critical
          receiver: "discord"
          continue: false
        - match:
            severity: warning
          receiver: "discord"
          continue: false
    receivers:
      - name: "null"
      - name: "discord"
        webhook_configs:
          - url: "http://alertmanager-discord:9093/alerts"
            send_resolved: true

# Default alerting rules
defaultRules:
  create: true
  rules:
    etcd: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeProxy: false
    kubeControllerManager: false

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Node Exporter
nodeExporter:
  enabled: true
  nodeAffinity: {}
  tolerations:
    - operator: Exists

# Prometheus Operator - disable admission webhooks to prevent failing job
prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
