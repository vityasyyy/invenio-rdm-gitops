apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.vityasy.me`)
      kind: Rule
      middlewares:
        - name: security-headers
          namespace: traefik
      services:
        - name: monitoring-grafana
          port: 80