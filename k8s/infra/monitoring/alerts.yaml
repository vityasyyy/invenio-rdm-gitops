apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-health-alerts
  namespace: monitoring
spec:
  groups:
    - name: cluster-health
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
        - alert: PodNotReady
          expr: kube_pod_status_phase{phase!="Running"} == 1
          for: 10m
          labels:
            severity: warning
        - alert: HighMemoryUsage
          expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
          for: 5m
          labels:
            severity: warning
        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: critical
    - name: invenio-operations
      rules:
        - alert: InvenioWebReplicasUnavailable
          expr: |
            kube_deployment_status_replicas_available{
              namespace="invenio",deployment="invenio-web"
            } < kube_deployment_spec_replicas{
              namespace="invenio",deployment="invenio-web"
            }
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Invenio web replicas unavailable"
            description: "invenio/invenio-web has fewer available replicas than desired for more than 10m."
        - alert: InvenioPodRestartHigh
          expr: |
            increase(
              kube_pod_container_status_restarts_total{namespace="invenio"}[30m]
            ) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Invenio pod restarts are elevated"
            description: >-
              Container {{ $labels.container }} in pod
              {{ $labels.pod }} restarted more than 3 times in 30m.
        - alert: InvenioTraffic5xxRatioHigh
          expr: |
            100 * (
              sum(rate(
                traefik_service_requests_total{
                  service=~"invenio-web.*",code=~"5.."
                }[10m]
              )) / clamp_min(
                sum(rate(
                  traefik_service_requests_total{
                    service=~"invenio-web.*"
                  }[10m]
                )), 0.001
              )
            ) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Invenio 5xx ratio is high"
            description: "Traefik reports more than 2% 5xx responses for invenio-web over the last 10m."
        - alert: InvenioPVCUsageHigh
          expr: |
            100 * (
              1 - (
                sum(kubelet_volume_stats_available_bytes{namespace="invenio"}) /
                clamp_min(
                  sum(kubelet_volume_stats_capacity_bytes{namespace="invenio"}), 1
                )
              )
            ) > 80
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Invenio PVC usage is high"
            description: "Persistent volume usage in namespace invenio is above 80%."
        - alert: InvenioTraffic4xxRatioHigh
          expr: |
            100 * (
              sum(rate(
                traefik_service_requests_total{
                  service=~"invenio-web.*",code=~"4.."
                }[10m]
              )) / clamp_min(
                sum(rate(
                  traefik_service_requests_total{
                    service=~"invenio-web.*"
                  }[10m]
                )), 0.001
              )
            ) > 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Invenio 4xx ratio is high (>10%)"
            description: >-
              Traefik reports more than 10% 4xx responses for invenio-web
              over the last 10m. This may indicate a routing or network
              policy issue.
    - name: velero.rules
      rules:
        - alert: VeleroBackupFailed
          expr: velero_backup_attempt_total - velero_backup_success_total > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Velero backup failed"
            description: "Velero backup has failed attempts. Check velero backup logs."
        - alert: VeleroBackupStale
          expr: time() - velero_backup_timestamp > 8 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "No Velero backup in over 8 days"
            description: "The last successful Velero backup was more than 8 days ago."
    - name: database.rules
      rules:
        - alert: PostgreSQLHighConnections
          expr: cnpg_collection_connections_total / cnpg_collection_connections_max > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL connection usage above 80%"
            description: "Cluster {{ $labels.cluster_name }} is using more than 80% of available connections."
    - name: minio.rules
      rules:
        - alert: MinIOHighDiskUsage
          expr: minio_cluster_disk_free_bytes / minio_cluster_disk_total_bytes < 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "MinIO disk usage above 80%"
            description: "MinIO has less than 20% free disk space."
    - name: opensearch.rules
      rules:
        - alert: OpenSearchClusterRed
          expr: opensearch_cluster_status == 2
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "OpenSearch cluster status is red"
            description: "OpenSearch cluster is in RED state. Some shards are unavailable."
    - name: traefik-routing
      rules:
        - alert: TraefikHigh404Rate
          expr: |
            100 * (
              sum(rate(traefik_service_requests_total{code="404"}[5m])) /
              clamp_min(sum(rate(traefik_service_requests_total[5m])), 0.001)
            ) > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Traefik 404 rate is above 5%"
            description: >-
              High proportion of 404 responses from Traefik. Likely a
              routing, network policy, or missing service issue.
        - alert: TraefikServiceDown
          expr: |
            count(traefik_service_server_up) by (service) == 0
            and on(service) count(traefik_service_requests_total) by (service) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Traefik backend {{ $labels.service }} has no healthy servers"
            description: "All backend servers for this Traefik service are down."
    - name: cloudflared-tunnel
      rules:
        - alert: CloudflareTunnelDown
          expr: up{job=~".*cloudflared.*"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Cloudflare tunnel is down"
            description: "cloudflared is not reporting as up. External access is likely broken."
    - name: cnpg-replication
      rules:
        - alert: CNPGReplicationLagHigh
          expr: cnpg_collection_replication_lag > 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL replication lag is high"
            description: "Cluster {{ $labels.cluster_name }} has replication lag above 30 seconds."
