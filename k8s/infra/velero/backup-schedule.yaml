# Velero backup schedule - weekly infrastructure backup
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: weekly-infra-backup
  namespace: velero
  labels:
    backup-scope: infra-and-invenio
spec:
  schedule: "0 3 * * 0"
  template:
    ttl: 672h
    includedNamespaces:
      - argocd
      - traefik
      - monitoring
      - minio
      - invenio
      - database
      - redis
      - search
      - velero
      - cert-manager
    defaultVolumesToFsBackup: true
    snapshotVolumes: false
    storageLocation: default
