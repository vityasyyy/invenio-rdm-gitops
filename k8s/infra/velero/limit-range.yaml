apiVersion: v1
kind: LimitRange
metadata:
  name: velero-default-limits
  namespace: velero
spec:
  limits:
    - default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: 1
        memory: 1Gi
      min:
        cpu: 25m
        memory: 32Mi
      type: Container
