# Velero Helm Values - Versioned Configuration
#
# Chart: velero v11.4.0
# Source: https://vmware-tanzu.github.io/helm-charts
#
# This file is the source of truth for Velero configuration.
# Any changes should be committed to Git.

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Enable metrics for Prometheus monitoring
metrics:
  enabled: true

# Enable volume snapshots
snapshotsEnabled: true

# Deploy node agent for backup/restore
deployNodeAgent: true

# Credentials for S3-compatible storage
credentials:
  useSecret: true
  existingSecret: velero-credentials

# Backup storage configuration - points to in-cluster MinIO
configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      config:
        region: minio
        s3ForcePathStyle: true
        s3Url: http://minio.minio.svc.cluster.local:9000
  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: minio

# Init container for AWS plugin (needed for S3-compatible storage)
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
