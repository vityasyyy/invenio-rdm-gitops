apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  "server.disable.auth": "false"
  "users.anonymous.enabled": "false"
  "statusbadge.enabled": "true"
  "account.anonymous.enabled": "false"
  "accounts.github-actions": "apiKey"
  # Reduce reconciliation frequency to avoid GitHub rate-limiting/timeouts
  "timeout.reconciliation": "600s"
