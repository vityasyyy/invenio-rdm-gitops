# ArgoCD Ingress - for Cloudflare Tunnel exposure
# Uses Traefik IngressRoute (since we have Traefik in the cluster)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.vityasy.me`)
      kind: Rule
      services:
        - name: argocd-server
          port: 8080
      middlewares:
        - name: argocd-headers
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-headers
  namespace: argocd
spec:
  headers:
    frameDeny: true
    contentSecurityPolicy: "frame-ancestors 'self'"
    browserXssFilter: true
    contentTypeNosniff: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    forceSTSHeader: true
