apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.12.0/manifests/install.yaml
  - install.yaml
  - argocd-ingress.yaml

namespace: argocd

labels:
  - pairs:
      app.kubernetes.io/name: argocd
      app.kubernetes.io/part-of: argocd

patches:
  # --- ConfigMap overrides for ArgoCD ---
  - path: patches/argocd-cm.yaml
  - path: patches/argocd-cmd-params-cm.yaml
  - path: patches/argocd-rbac-cm.yaml
  # --- Security and resource patches (with kustomize subdir) ---
  - path: patches/kustomize/security-context-server.yaml
  - path: patches/kustomize/security-context-repo.yaml
  - path: patches/kustomize/security-context-controller.yaml
  - path: patches/kustomize/security-context-dex.yaml
  - path: patches/kustomize/security-context-redis.yaml
  - path: patches/kustomize/security-context-notifications.yaml
  - path: patches/kustomize/security-context-applicationset.yaml

  # --- Patch ArgoCD server to use HTTP (TLS handled by Cloudflare) ---
  - target:
      kind: Service
      name: argocd-server
    patch: |
      - op: replace
        path: /spec/ports
        value:
          - name: http
            port: 8080
            targetPort: 8080
          - name: grpc
            port: 8081
            targetPort: 8081

  - target:
      kind: Deployment
      name: argocd-server
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --insecure
