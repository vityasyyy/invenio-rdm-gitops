apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: traefik

# Traefik is managed via Helm, not kustomize.
# This kustomization exists for consistency with the repo structure.
#
# To deploy/update Traefik:
#   helm upgrade traefik traefik/traefik -n traefik -f k8s/infra/traefik/values.yaml
#
# Or use bootstrap-infra.sh which handles Helm automatically.
