apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.slack: |
    token: $slack-token
  context.slack: |
    app: argocd
  service.webhook.slack: |
    url: $slack-webhook-url
  template.app-sync-succeeded: |
    message: |
      Application {{.app.metadata.name}} has been successfully synced at {{.app.status.operationState.startedAt}}.
    slack:
      attachment: |
        {
          "color": "#36a64f",
          "title": "{{.app.metadata.name}} synced successfully",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "text": "{{.app.status.operationState.message}}",
          "fields": [
            {
              "title": "Sync Status",
              "value": "{{.app.status.sync.status}}",
              "short": true
            },
            {
              "title": "Repository",
              "value": "{{.app.spec.source.repoURL}}",
              "short": true
            },
            {
              "title": "Revision",
              "value": "{{.app.status.sync.revision}}",
              "short": true
            }
          ]
        }
  template.app-sync-failed: |
    message: |
      The sync operation of application {{.app.metadata.name}} has failed at {{.app.status.operationState.finishedAt}}.
    slack:
      attachment: |
        {
          "color": "#ff0000",
          "title": "{{.app.metadata.name}} sync failed",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "text": "{{.app.status.operationState.message}}",
          "fields": [
            {
              "title": "Sync Status",
              "value": "{{.app.status.sync.status}}",
              "short": true
            },
            {
              "title": "Repository",
              "value": "{{.app.spec.source.repoURL}}",
              "short": true
            },
            {
              "title": "Revision",
              "value": "{{.app.status.sync.revision}}",
              "short": true
            }
          ]
        }
  template.app-health-degraded: |
    message: |
      Application {{.app.metadata.name}} has been degraded.
    slack:
      attachment: |
        {
          "color": "#ffaa00",
          "title": "{{.app.metadata.name}} is degraded",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "text": "Application health status: {{.app.status.health.status}}",
          "fields": [
            {
              "title": "Health Status",
              "value": "{{.app.status.health.status}}",
              "short": true
            },
            {
              "title": "Repository",
              "value": "{{.app.spec.source.repoURL}}",
              "short": true
            }
          ]
        }
  trigger.on-sync-succeeded: |
    - description: Application syncing has succeeded
      send:
      - app-sync-succeeded
      when: app.status.operationState.phase in ['Succeeded'] and app.status.operationState.syncResult.revision != app.status.sync.revision
  trigger.on-sync-failed: |
    - description: Application syncing has failed
      send:
      - app-sync-failed
      when: app.status.operationState.phase in ['Failed', 'Error', 'Unknown']
  trigger.on-health-degraded: |
    - description: Application has degraded
      send:
      - app-health-degraded
      when: app.status.health.status == 'Degraded'
