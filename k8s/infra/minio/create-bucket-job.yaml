# MinIO Bucket Creation Job
# This Job runs after MinIO is deployed to create the velero-backups bucket
# It runs with proper security context to satisfy the restricted PSA
apiVersion: batch/v1
kind: Job
metadata:
  name: create-velero-backup-bucket
  namespace: minio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: minio-bucket-creator
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Configuring MinIO client..."
              mc alias set minio http://minio.minio.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              
              echo "Checking if bucket exists..."
              if mc ls minio/velero-backups &>/dev/null; then
                echo "Bucket velero-backups already exists, skipping creation."
              else
                echo "Creating bucket velero-backups..."
                mc mb minio/velero-backups
                echo "Bucket created successfully!"
              fi
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: rootPassword
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      restartPolicy: OnFailure
