# OpenSearch Helm values for InvenioRDM
# Single-node cluster with security plugin disabled for simplicity.
clusterName: opensearch-cluster
nodeGroup: master

# Single replica for resource efficiency
replicas: 1
singleNode: true

# Disable security plugin (HTTP only, in-cluster comms)
config:
  opensearch.yml: |
    cluster.name: opensearch-cluster
    network.host: 0.0.0.0
    plugins.security.disabled: true

# Resource limits
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Startup probe: OpenSearch can take a long time on first start or after
# a crash, especially with NFS-backed PVCs and single-node mode.
startupProbe:
  enabled: true
  tcpSocket:
    port: 9200
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 180  # 30 minutes total

# Readiness probe
readinessProbe:
  tcpSocket:
    port: 9200
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Liveness probe (disabled by default in Helm chart; only enable after
# startupProbe has succeeded)
livenessProbe:
  enabled: true
  tcpSocket:
    port: 9200
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 10

# Persistence
persistence:
  enabled: true
  storageClass: btd-nfs
  size: 10Gi

# Security context for restricted PSA
securityContext:
  runAsUser: 1000
  runAsGroup: 1000

# Extra init containers — clear stale lock files left by previous
# pod instances (common when using NFS-backed PVCs and force-delete).
extraInitContainers:
  - name: remove-stale-lock
    image: busybox:1.36.1
    command:
      - sh
      - -c
      - |
        rm -f /usr/share/opensearch/data/nodes/0/node.lock
        rm -f /usr/share/opensearch/data/nodes/0/_state/write.lock
        echo "Stale locks removed if present."
    volumeMounts:
      - name: opensearch-cluster-master
        mountPath: /usr/share/opensearch/data

# No separate client/data nodes for single-instance
roles:
  - master
  - ingest
  - data

# Metrics exporter
metricsExporter:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    labels:
      release: monitoring
