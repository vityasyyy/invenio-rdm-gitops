# Network policies for database namespace
#
# IMPORTANT: kube-proxy DNAT port substitution
# When pods connect to a ClusterIP Service (e.g. kubernetes API at 10.43.0.1:443),
# kube-proxy DNATs the destination to the real endpoint (e.g. 10.17.117.41:6443)
# BEFORE Calico evaluates egress iptables rules. This means a NetworkPolicy matching
# only destination port 443 will silently drop the DNATed packets whose destination
# port is now 6443. Any egress policy targeting the Kubernetes API server MUST include
# both ports 443 and 6443.
#
# NOTE: No default-deny ingress because the CloudNativePG webhook must be reachable
# from the Kubernetes API server (host network), which cannot be matched by namespaceSelector.
# Individual pods are protected by specific ingress policies.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-operator-ingress
  namespace: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 9443
          protocol: TCP
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-egress
  namespace: database
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - port: 9000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-invenio
  namespace: database
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: invenio
      ports:
        - port: 5432
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-monitoring
  namespace: database
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9187
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-dns
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-minio
  namespace: database
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - port: 9000
          protocol: TCP
---
# database-allow-apiserver — allows all pods in the database namespace to reach the
# Kubernetes API server. Both ports 443 and 6443 are required because kube-proxy DNATs
# ClusterIP traffic (dst port 443 → 6443) before Calico evaluates egress rules, so a
# policy matching only port 443 silently drops the DNATed packets.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-apiserver
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
# database-allow-instance-ingress — allows the CNPG operator to reach postgres instances
# on the status and postgres ports, and allows postgres pods to reach each other for
# replication and join operations. Without this, the operator cannot extract instance
# status (port 8000), and new replicas cannot join the cluster (port 5432).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-instance-ingress
  namespace: database
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
        - podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
      ports:
        - port: 8000
          protocol: TCP
        - port: 5432
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
      ports:
        - port: 5432
          protocol: TCP
---
# database-allow-operator-egress — allows the CNPG operator to reach postgres instances
# on the status and postgres ports. This egress rule is needed because database-allow-egress
# (podSelector: {}) creates a default-deny egress, so the operator needs explicit egress
# to ports 8000 and 5432 within the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow-operator-egress
  namespace: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
      ports:
        - port: 8000
          protocol: TCP
        - port: 5432
          protocol: TCP
