# Namespace and governance for InvenioRDM Redis dependency
---
apiVersion: v1
kind: Namespace
metadata:
  name: redis
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    app.kubernetes.io/part-of: invenio-rdm
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: redis-quota
  namespace: redis
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "2Gi"
    limits.cpu: "2"
    limits.memory: "4Gi"
    pods: "5"
    services: "5"
    persistentvolumeclaims: "3"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: redis-limits
  namespace: redis
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "25m"
        memory: "32Mi"
      type: Container
