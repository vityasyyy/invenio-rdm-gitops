# InvenioRDM Celery worker deployment
# Handles async tasks: indexing, file processing, email, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invenio-worker
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-worker
    app.kubernetes.io/part-of: invenio-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invenio-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-worker
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-opensearch
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for OpenSearch to be ready..."
              until wget -qO- http://invenio-search.invenio.svc.cluster.local:9200/_cluster/health | grep -q '"status"'; do
                echo "OpenSearch not ready yet, waiting 5s..."
                sleep 5
              done
              echo "OpenSearch is ready!"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/inveniosoftware/demo-inveniordm/demo-inveniordm:13.0.0-post1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              exec celery -A invenio_app.celery worker \
                --loglevel=INFO \
                --concurrency=2 \
                --prefetch-multiplier=1 \
                --without-gossip \
                --without-mingle \
                --without-heartbeat
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
