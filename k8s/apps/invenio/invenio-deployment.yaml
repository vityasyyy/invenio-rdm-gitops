apiVersion: apps/v1
kind: Deployment
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-web
    app.kubernetes.io/part-of: invenio-rdm
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: invenio-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-web
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      containers:
        - name: web
          image: ghcr.io/inveniosoftware/invenio-rdm:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app.kubernetes.io/name: invenio-web
  ports:
    - name: http
      port: 8000
      targetPort: http
