# InvenioRDM web deployment
# Pinned image, probes, resource limits, security-hardened.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-web
    app.kubernetes.io/part-of: invenio-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invenio-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-web
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-opensearch
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for OpenSearch to be ready..."
              until wget -qO- http://invenio-search.invenio.svc.cluster.local:9200/_cluster/health | grep -q '"status"'; do
                echo "OpenSearch not ready yet, waiting 5s..."
                sleep 5
              done
              echo "OpenSearch is ready!"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/vityasyyy/invenio-rdm-custom:latest
          imagePullPolicy: Always
          command:
            - gunicorn
            - invenio_app.wsgi:application
            - --bind
            - 0.0.0.0:5000
            - --workers
            - "2"
            - --threads
            - "2"
            - --access-logfile
            - "-"
            - --error-logfile
            - "-"
            - --log-level
            - INFO
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          # Use tcpSocket probes to avoid HTTP->HTTPS redirect issues
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-web
    app.kubernetes.io/part-of: invenio-rdm
spec:
  selector:
    app.kubernetes.io/name: invenio-web
  ports:
    - name: http
      port: 8000
      targetPort: http
