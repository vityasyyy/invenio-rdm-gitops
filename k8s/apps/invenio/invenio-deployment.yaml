# InvenioRDM web deployment
# Pinned image, probes, resource limits, security-hardened.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-web
    app.kubernetes.io/part-of: invenio-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invenio-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-web
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-opensearch
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for OpenSearch to be ready..."
              until wget -qO- http://invenio-search.invenio.svc.cluster.local:9200/_cluster/health | grep -q '"status"'; do
                echo "OpenSearch not ready yet, waiting 5s..."
                sleep 5
              done
              echo "OpenSearch is ready!"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
        - name: build-assets
          image: ghcr.io/vityasyyy/invenio-rdm-custom:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - |
              echo "=== Building Invenio static assets ==="
              echo "Creating templates directory for webpack resolution..."
              mkdir -p ${INVENIO_INSTANCE_PATH}/assets/templates/custom_fields
              MANIFEST_PATH="${INVENIO_INSTANCE_PATH}/static/dist/manifest.json"
              NEEDS_BUILD=true

              if [ -f "$MANIFEST_PATH" ]; then
                if grep -q '"status".*:"compile"' "$MANIFEST_PATH" 2>/dev/null || \
                   ! grep -q '"theme.css"' "$MANIFEST_PATH" 2>/dev/null; then
                  echo "manifest.json is a placeholder, rebuilding..."
                  rm -f "$MANIFEST_PATH"
                else
                  echo "Static assets already built, skipping."
                  NEEDS_BUILD=false
                fi
              fi

              if [ "$NEEDS_BUILD" = true ]; then
                echo "  [1/4] Collecting static files..."
                invenio collect -v 2>/dev/null || echo "WARNING: invenio collect failed"

                echo "  [2/4] Creating webpack project..."
                invenio webpack create 2>/dev/null || echo "WARNING: invenio webpack create failed"

                echo "  [3/4] Installing theme.config..."
                cp /etc/invenio-theme-config/theme.config ${INVENIO_INSTANCE_PATH}/assets/less/theme.config

                ASSETS_DIR="${INVENIO_INSTANCE_PATH}/assets"
                if [ -d "$ASSETS_DIR" ] && [ -f "$ASSETS_DIR/package.json" ]; then
                  echo "  [4/4] Installing dependencies and building webpack bundles..."
                  cd "$ASSETS_DIR"
                  npm install --production=false 2>&1 | tail -5
                  npm run build 2>&1 | tail -10
                  cd /opt/invenio
                else
                  echo "  [4/4] Skipped — no webpack project found"
                fi

                if [ -f "$MANIFEST_PATH" ] && grep -q '"theme.css"' "$MANIFEST_PATH" 2>/dev/null; then
                  echo "=== Asset build complete ==="
                else
                  echo "WARNING: manifest.json still incomplete after build."
                  cat "$MANIFEST_PATH"
                  exit 1
                fi
              fi
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1654
            runAsGroup: 1654
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: instance-data
              mountPath: /opt/invenio/var/instance/static
              subPath: static
            - name: instance-data
              mountPath: /opt/invenio/var/instance/assets
              subPath: assets
            - name: theme-config
              mountPath: /etc/invenio-theme-config
      containers:
        - name: web
          image: ghcr.io/vityasyyy/invenio-rdm-custom:latest
          imagePullPolicy: Always
          args:
            - gunicorn
            - invenio_app.wsgi:application
            - --bind
            - 0.0.0.0:5000
            - --workers
            - "2"
            - --threads
            - "2"
            - --access-logfile
            - "-"
            - --error-logfile
            - "-"
            - --log-level
            - INFO
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          # Startup probe: main container just starts gunicorn (asset build
          # is done by the build-assets init container).
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: instance-data
              mountPath: /opt/invenio/var/instance/static
              subPath: static
            - name: instance-data
              mountPath: /opt/invenio/var/instance/assets
              subPath: assets
      volumes:
        - name: instance-data
          emptyDir: {}
        - name: theme-config
          configMap:
            name: invenio-theme-config
---
apiVersion: v1
kind: Service
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-web
    app.kubernetes.io/part-of: invenio-rdm
spec:
  selector:
    app.kubernetes.io/name: invenio-web
  ports:
    - name: http
      port: 8000
      targetPort: http
