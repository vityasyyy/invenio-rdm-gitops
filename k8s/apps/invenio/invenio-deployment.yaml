# InvenioRDM web deployment
# Pinned image, probes, resource limits, security-hardened.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-web
    app.kubernetes.io/part-of: invenio-rdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invenio-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-web
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/inveniosoftware/demo-inveniordm/demo-inveniordm:13.0.0-post1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              exec uwsgi --http 0.0.0.0:5000 \
                --module invenio_app.wsgi \
                --callable application \
                --processes 2 \
                --threads 2 \
                --max-requests 1000 \
                --harakiri 60 \
                --logformat '%(addr) - %(user) [%(ltime)] "%(method) %(uri) %(proto)" %(status) %(size) %(msecs)ms'
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          # Invenio startup can be slow on first run; use a generous startup probe
          startupProbe:
            httpGet:
              path: /api/records
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/records
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/records
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: invenio-web
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: invenio-web
    app.kubernetes.io/part-of: invenio-rdm
spec:
  selector:
    app.kubernetes.io/name: invenio-web
  ports:
    - name: http
      port: 8000
      targetPort: http
