# InvenioRDM setup / initialization job
# Runs at sync wave 2 (before app deployment at wave 3) to ensure DB schema,
# search indices, and file locations exist. Idempotent — safe to re-run on every sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: invenio-setup
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  manualSelector: true
  selector:
    matchLabels:
      app.kubernetes.io/name: invenio-setup
      app.kubernetes.io/part-of: invenio-rdm
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-setup
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: ghcr.io/vityasyyy/invenio-rdm-custom:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Waiting for dependencies to be ready..."

              python3 -c "
              import socket, time, urllib.request

              def wait_tcp(host, port, name):
                  while True:
                      try:
                          socket.create_connection((host, port), timeout=2).close()
                          print(f'{name} is ready')
                          return
                      except Exception:
                          print(f'Waiting for {name}...')
                          time.sleep(5)

              def wait_http(url, name):
                  while True:
                      try:
                          urllib.request.urlopen(url, timeout=2)
                          print(f'{name} is ready')
                          return
                      except Exception:
                          print(f'Waiting for {name}...')
                          time.sleep(5)

              wait_tcp('invenio-postgresql.invenio.svc.cluster.local', 5432, 'PostgreSQL')
              wait_tcp('invenio-redis.invenio.svc.cluster.local', 6379, 'Redis')
              wait_http('http://invenio-search.invenio.svc.cluster.local:9200/_cluster/health', 'OpenSearch')
              print('All dependencies ready. Running Invenio setup...')
              "

              # Initialize database (idempotent)
              echo "[1/5] Creating database tables..."
              if ! invenio db create 2>&1; then
                echo "WARNING: invenio db create failed (may already exist)"
              fi

              # Initialize search indices (skip if already exist)
              echo "[2/5] Initializing search indices..."
              if ! invenio index list --json 2>/dev/null | grep -q '"aliases"'; then
                if ! invenio index init 2>&1; then
                  echo "WARNING: invenio index init failed (may already exist)"
                fi
              else
                echo "Search indices already exist, skipping."
              fi

              # Create RDM fixtures (roles, permissions, vocabularies,
              # default community, deposit workflow — idempotent)
              echo "[3/5] Creating RDM fixtures..."
              invenio rdm-records fixtures

              # Create default file location if it doesn't exist
              echo "[4/5] Creating default file location..."
              if ! invenio files location create --default default-location s3://invenio-rdm/files/ 2>&1; then
                echo "File location may already exist, continuing."
              fi

              # Create MinIO buckets if they don't exist
              echo "[5/5] Ensuring MinIO buckets exist..."
              python3 -c "
              import boto3
              from botocore.config import Config
              from botocore.exceptions import ClientError
              import os

              s3 = boto3.client(
                  's3',
                  endpoint_url='http://minio.minio.svc.cluster.local:9000',
                  aws_access_key_id=os.environ['INVENIO_S3_ACCESS_KEY_ID'],
                  aws_secret_access_key=os.environ['INVENIO_S3_SECRET_ACCESS_KEY'],
                  config=Config(signature_version='s3v4'),
                  region_name='us-east-1'
              )

              for bucket in ['invenio-rdm', 'invenio-rdm-uploads', 'invenio-rdm-backups']:
                  try:
                      s3.head_bucket(Bucket=bucket)
                      print(f'Bucket {bucket} already exists')
                  except ClientError as e:
                      error_code = e.response['Error']['Code']
                      if error_code == '404':
                          print(f'Creating bucket {bucket}...')
                          s3.create_bucket(Bucket=bucket)
                          print(f'Bucket {bucket} created')
                      else:
                          print(f'ERROR: Failed to check bucket {bucket}: {e}')
                          raise

              print('All buckets verified')
              "

              echo "Invenio setup complete!"
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
