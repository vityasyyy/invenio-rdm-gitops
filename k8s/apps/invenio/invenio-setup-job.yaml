# InvenioRDM setup / initialization job
# Runs before app deployment to ensure DB schema, search indices, and file locations exist.
# Uses ArgoCD PreSync hook so it runs before the Deployment is updated.
apiVersion: batch/v1
kind: Job
metadata:
  name: invenio-setup
  namespace: invenio
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-setup
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: ghcr.io/inveniosoftware/invenio-rdm:v12
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for dependencies to be ready..."

              # Wait for PostgreSQL
              until nc -z invenio-postgresql.invenio.svc.cluster.local 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 5
              done

              # Wait for Redis
              until nc -z invenio-redis.invenio.svc.cluster.local 6379; do
                echo "Waiting for Redis..."
                sleep 5
              done

              # Wait for OpenSearch
              until curl -sf http://invenio-search.invenio.svc.cluster.local:9200/_cluster/health >/dev/null; do
                echo "Waiting for OpenSearch..."
                sleep 5
              done

              echo "All dependencies ready. Running Invenio setup..."

              # Initialize database (idempotent)
              invenio db create || true

              # Initialize search indices
              invenio index init --force || true

              # Create default file location if it doesn't exist
              invenio files location create --default default-location \
                s3://invenio-rdm/files/ || true

              echo "Invenio setup complete!"
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
