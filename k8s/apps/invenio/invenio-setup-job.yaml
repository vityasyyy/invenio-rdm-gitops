# InvenioRDM setup / initialization job
# Runs at sync wave 2 (before app deployment at wave 3) to ensure DB schema,
# search indices, and file locations exist. Idempotent — safe to re-run on every sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: invenio-setup
  namespace: invenio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-setup
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: ghcr.io/inveniosoftware/demo-inveniordm/demo-inveniordm:13.0.0-post1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for dependencies to be ready..."

              python3 -c "
              import socket, time, urllib.request

              def wait_tcp(host, port, name):
                  while True:
                      try:
                          socket.create_connection((host, port), timeout=2).close()
                          print(f'{name} is ready')
                          return
                      except Exception:
                          print(f'Waiting for {name}...')
                          time.sleep(5)

              def wait_http(url, name):
                  while True:
                      try:
                          urllib.request.urlopen(url, timeout=2)
                          print(f'{name} is ready')
                          return
                      except Exception:
                          print(f'Waiting for {name}...')
                          time.sleep(5)

              wait_tcp('invenio-postgresql.invenio.svc.cluster.local', 5432, 'PostgreSQL')
              wait_tcp('invenio-redis.invenio.svc.cluster.local', 6379, 'Redis')
              wait_http('http://invenio-search.invenio.svc.cluster.local:9200/_cluster/health', 'OpenSearch')
              print('All dependencies ready. Running Invenio setup...')
              "

              # Initialize database (idempotent)
              invenio db create || true

              # Initialize search indices (skip if already exist)
              if ! invenio index list --json 2>/dev/null | grep -q '"aliases"'; then
                invenio index init || true
              fi

              # Create default file location if it doesn't exist
              invenio files location create --default default-location \
                s3://invenio-rdm/files/ || true

              echo "Invenio setup complete!"
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
