# InvenioRDM setup / initialization job
#
# This is an ArgoCD PostSync hook — it runs automatically after every sync
# (including image updates from argocd-image-updater).
# BeforeHookCreation deletes any previous run before starting a new one.
#
# Script is fully idempotent: safe to re-run at any time.
apiVersion: batch/v1
kind: Job
metadata:
  name: invenio-setup
  namespace: invenio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invenio-setup
        app.kubernetes.io/part-of: invenio-rdm
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: ghcr.io/vityasyyy/invenio-rdm-custom:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=== InvenioRDM Setup (PostSync Hook) ==="
              echo "Waiting for all dependencies to be ready..."

              python3 -c "
              import socket, time, urllib.request

              def wait_tcp(host, port, name):
                  for i in range(60):
                      try:
                          socket.create_connection((host, port), timeout=3).close()
                          print(f'{name} ready')
                          return
                      except Exception:
                          print(f'Waiting for {name}... ({i+1}/60)')
                          time.sleep(5)
                  raise RuntimeError(f'{name} not available after 5 minutes')

              def wait_http(url, name):
                  for i in range(60):
                      try:
                          urllib.request.urlopen(url, timeout=3)
                          print(f'{name} ready')
                          return
                      except Exception:
                          print(f'Waiting for {name}... ({i+1}/60)')
                          time.sleep(5)
                  raise RuntimeError(f'{name} not available after 5 minutes')

              wait_tcp('invenio-postgresql.invenio.svc.cluster.local', 5432, 'PostgreSQL')
              wait_tcp('invenio-redis.invenio.svc.cluster.local', 6379, 'Redis')
              wait_http('http://invenio-search.invenio.svc.cluster.local:9200/_cluster/health', 'OpenSearch')
              "

              echo ""
              echo "[1/8] Creating database tables (idempotent)..."
              invenio db create 2>&1 || echo "Tables may already exist, continuing."

              echo ""
              echo "[2/8] Running pending database migrations..."
              invenio alembic upgrade 2>&1
              echo "Migrations done."

              echo ""
              echo "[3/8] Initializing search indices..."
              invenio index init 2>&1 || echo "Indices may already exist, continuing."

              echo ""
              echo "[4/8] Creating admin role and superuser access..."
              invenio roles create admin 2>&1 || echo "Role may already exist."
              invenio access allow superuser-access role admin 2>&1 || echo "Permission may already exist."

              echo ""
              echo "[5/8] Loading RDM fixtures (vocabularies, resource types, etc.)..."
              invenio rdm-records fixtures 2>&1
              echo "Fixtures loaded."

              echo ""
              echo "[6/8] Rebuilding search index for existing records..."
              invenio rdm-records rebuild-index 2>&1 || echo "No existing records to rebuild (first run)."

              echo ""
              echo "[7/8] Creating default file location..."
              invenio files location create --default default-location s3://invenio-rdm/files/ 2>&1 \
                || echo "File location may already exist, continuing."

              echo ""
              echo "[8/8] Ensuring MinIO buckets exist..."
              python3 -c "
              import boto3, os
              from botocore.config import Config
              from botocore.exceptions import ClientError

              s3 = boto3.client(
                  's3',
                  endpoint_url=os.environ['INVENIO_S3_ENDPOINT'],
                  aws_access_key_id=os.environ['INVENIO_S3_ACCESS_KEY_ID'],
                  aws_secret_access_key=os.environ['INVENIO_S3_SECRET_ACCESS_KEY'],
                  config=Config(signature_version='s3v4'),
                  region_name='us-east-1'
              )

              for bucket in ['invenio-rdm', 'invenio-rdm-uploads', 'invenio-rdm-backups']:
                  try:
                      s3.head_bucket(Bucket=bucket)
                      print(f'Bucket {bucket} already exists')
                  except ClientError as e:
                      if e.response['Error']['Code'] == '404':
                          s3.create_bucket(Bucket=bucket)
                          print(f'Bucket {bucket} created')
                      else:
                          raise
              print('All buckets verified')
              "

              echo ""
              echo "=== InvenioRDM setup complete! ==="
          envFrom:
            - configMapRef:
                name: invenio-app-config
            - secretRef:
                name: invenio-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
