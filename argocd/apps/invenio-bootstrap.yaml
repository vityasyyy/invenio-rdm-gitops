apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: invenio-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: invenio
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: invenio-worker
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: invenio-web
      jsonPointers:
        - /spec/replicas
  source:
    repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
    targetRevision: main
    path: k8s/apps/invenio
  destination:
    server: https://kubernetes.default.svc
    namespace: invenio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
