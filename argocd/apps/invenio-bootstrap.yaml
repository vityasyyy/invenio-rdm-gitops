apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: invenio-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    # ArgoCD Image Updater: watch for new invenio-rdm-custom images
    argocd-image-updater.argoproj.io/image-list: invenio-web=ghcr.io/vityasyyy/invenio-rdm-custom:latest, invenio-worker=ghcr.io/vityasyyy/invenio-rdm-custom:latest
    argocd-image-updater.argoproj.io/invenio-web.update-strategy: semver
    argocd-image-updater.argoproj.io/invenio-worker.update-strategy: semver
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: infra
  source:
    repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
    targetRevision: main
    path: k8s/apps/invenio
  destination:
    server: https://kubernetes.default.svc
    namespace: invenio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
