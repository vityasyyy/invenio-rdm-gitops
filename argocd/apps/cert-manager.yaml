apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: infra
  sources:
    # Helm chart source
    - chart: cert-manager
      repoURL: https://charts.jetstack.io
      targetRevision: v1.16.2
      helm:
        valueFiles:
          - $values/k8s/infra/cert-manager/values.yaml
    # Values file source (this repo)
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
