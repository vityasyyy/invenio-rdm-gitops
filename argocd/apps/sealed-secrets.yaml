# Sealed Secrets Controller
# Wave -3: Deploys the Sealed Secrets controller into kube-system
# ArgoCD itself is installed manually via scripts/bootstrap-infra.sh
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    app.kubernetes.io/name: infra
    app.kubernetes.io/component: sealed-secrets
spec:
  project: infra
  source:
    repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
    targetRevision: main
    path: k8s/infra/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
