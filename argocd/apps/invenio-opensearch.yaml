apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: invenio-opensearch
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: infra
  sources:
    # Helm chart: OpenSearch
    - chart: opensearch
      repoURL: https://opensearch-project.github.io/helm-charts/
      targetRevision: "2.32.0"
      helm:
        valueFiles:
          - $values/k8s/apps/invenio-deps/opensearch/values.yaml
    # Values file source (this repo)
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      ref: values
    # Raw manifests: namespace, netpols
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      path: k8s/apps/invenio-deps/opensearch/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: search
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
