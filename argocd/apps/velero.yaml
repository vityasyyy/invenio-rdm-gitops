apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: infra
  sources:
    # Helm chart source
    - chart: velero
      repoURL: https://vmware-tanzu.github.io/helm-charts
      targetRevision: "11.4.0"
      helm:
        valueFiles:
          - $values/k8s/infra/velero/values.yaml
    # Values file source (this repo)
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      ref: values
    # Additional manifests: credentials + backup schedule
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      path: k8s/infra/velero
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
