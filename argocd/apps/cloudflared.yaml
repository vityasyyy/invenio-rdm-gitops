# Cloudflare Tunnel DaemonSet
# Wave -1: Deployed AFTER sealed-secrets (wave -3) so credentials can be unsealed
# Credentials are managed via SealedSecret in this kustomization
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: infra
    app.kubernetes.io/component: cloudflared
spec:
  project: infra
  source:
    repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
    targetRevision: main
    path: external-lb/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
