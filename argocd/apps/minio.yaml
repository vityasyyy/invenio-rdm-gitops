apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: infra
  sources:
    - chart: minio
      repoURL: https://charts.min.io/
      targetRevision: "5.4.0"
      helm:
        valueFiles:
          - $values/k8s/infra/minio/values.yaml
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      path: k8s/infra/minio
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
