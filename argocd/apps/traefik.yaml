apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: infra
  sources:
    # Helm chart source
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: v39.0.6
      helm:
        valueFiles:
          - $values/k8s/infra/traefik/values.yaml
    # Values file source (this repo)
    - repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
