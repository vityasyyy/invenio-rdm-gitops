# ArgoCD Notifications
# Wave -6: Notification system must be deployed before other apps for early error visibility
# Provides Slack/Discord/Email alerts for sync failures, health degradation, etc.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-notifications
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
  labels:
    app.kubernetes.io/name: infra
    app.kubernetes.io/component: argocd-notifications
spec:
  project: infra
  source:
    repoURL: https://github.com/vityasyyy/invenio-rdm-gitops.git
    targetRevision: main
    path: k8s/infra/argocd-notifications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
