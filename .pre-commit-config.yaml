repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-c', '.yamllint']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: kustomize-build
        name: Validate Kustomize builds
        entry: bash
        args:
          - -c
          - |
            if ! command -v kustomize &>/dev/null; then
              echo "Skipping kustomize validation: kustomize not found in PATH"
              exit 0
            fi
            for f in "$@"; do
              dir=$(dirname "$f")
              echo "Building $dir ..."
              kustomize build "$dir" > /dev/null && echo "  ✓ $dir builds successfully"
            done
          - bash
        language: system
        files: kustomization\.yaml$
        pass_filenames: true
        require_serial: true

      - id: check-sealed-secret-placeholders
        name: Check SealedSecret placeholders
        entry: bash
        args:
          - -c
          - |
            found=0
            for f in "$@"; do
              if grep -iE 'PLACEHOLDER|TODO|FIXME|changeme' "$f"; then
                echo "::error file=$f::Placeholder value found in SealedSecret"
                found=1
              fi
            done
            exit $found
          - bash
        language: system
        files: '.*\.yaml$'
        pass_filenames: true