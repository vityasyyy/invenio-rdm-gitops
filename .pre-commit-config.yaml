repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: kustomize-build
        name: Validate Kustomize builds
        entry: bash
        args:
          - -c
          - |
            for f in "$@"; do
              dir=$(dirname "$f")
              echo "Building $dir ..."
              kustomize build "$dir" > /dev/null && echo "  ✓ $dir builds successfully"
            done
          - bash
        language: system
        files: kustomization\.yaml$
        pass_filenames: true
        require_serial: true
